name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e "./roomdoo-locks-base[dev]"
          pip install -e "./roomdoo-locks-ttlock[dev]"
          pip install -e "./roomdoo-locks-omnitec[dev]"
          pip install -e "./roomdoo-locks-salto[dev]"
          pip install -e "./roomdoo-locks-tesa[dev]"

      - name: Run tests
        run: pytest
